replicaCount: 1
image:
  repository: ghcr.io/backstage-demo-26/${{values.app_name}}
  pullPolicy: IfNotPresent
  tag: ${{values.app_name}}-${{values.app_env}}-latest
imagePullSecrets:
  - name: github-auth
nameOverride: ""
fullnameOverride: ""
podAnnotations: {}
podLabels: {}
serviceAccount:
  create: false
  automount: true
  annotations: {}
  name: ""
podSecurityContext: {}
securityContext: {}
service:
  type: LoadBalancer
  port: 5000
ingress:
  enabled: false
httpRoute:
  enabled: false
resources:
  requests:
    cpu: 50m
    memory: 50M
livenessProbe:
  httpGet:
    path: /api/${{values.app_name}}/v1/healthz
    port: http
readinessProbe:
  httpGet:
    path: /api/${{values.app_name}}/v1/healthz
    port: http
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
volumes: []
volumeMounts: []
nodeSelector: {}
tolerations: []
affinity: {}
