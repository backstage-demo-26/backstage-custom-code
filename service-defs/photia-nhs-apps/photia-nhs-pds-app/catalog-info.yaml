apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: photia-nhs-pds-app
  description: Wrapper NHS PDS API components
  tags:
    - c1 
    - c2 
  labels:
    category: photia
    sub-category: nhs-api
  annotations:
    github.com/project-slug: backstage-demo-26/backstage-custom-code/photia-nhs-apps/photia-nhs-pds-app
    backstage.io/techdocs-ref: dir:.
spec:
  type: service
  owner: development
  system: pds-trace-ui-flow
  lifecycle: production
  providesApis:
    - photia-nhs-pds-api
  consumesApis:
    - ext-nhs-pds-api

---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: photia-nhs-pds-api
  description: Photia NHS API for PDS tracing
spec:
  type: openapi
  lifecycle: production
  owner: development
  definition:
    $text: ./openapi/photia-nhs-pds-api.yaml
