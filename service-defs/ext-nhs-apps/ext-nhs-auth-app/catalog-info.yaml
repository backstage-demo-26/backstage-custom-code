apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: ext-nhs-access-token-api
  description: NHS Application Restricted Access Token interface
spec:
  type: openapi
  lifecycle: production
  owner: development
  definition:
    $text: ./openapi/ext-auth-app-restricted.yaml

